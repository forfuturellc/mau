name: Publish

on:
  push:
    tags:
      - "release/**"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
        contents: read
        id-token: write

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        registry-url: "https://registry.npmjs.org"
    - run: npm ci
    - run: npm run build --if-present
    - run: npm publish
